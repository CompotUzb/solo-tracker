services:
  solo-system-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solo-system-tracker
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3333
      DATABASE_PATH: /app/data/solo-system.sqlite
      SKIP_DISCORD_LOGIN: ${SKIP_DISCORD_LOGIN:-true}
    ports:
      - "3333:3333"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
